<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blue Gallery • Squidley</title>
<style>
body{margin:0;font-family:Inter,system-ui;background:#070f23;color:white}
.card-perspective{perspective:1200px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.34,1.56,.64,1);transform-style:preserve-3d}
.card-flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-back{transform:rotateY(180deg)}
</style>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#070f23] text-white">
<div class="pointer-events-none fixed inset-0 overflow-hidden">
  <div class="absolute -top-[30%] left-1/2 -translate-x-1/2 w-[120%] h-[70%] bg-[radial-gradient(ellipse_at_center,_rgba(42,74,122,0.35),transparent_60%)]"></div>
</div>

<div class="relative max-w-[1440px] mx-auto px-4 md:px-8 py-6">
  <div class="flex flex-col md:flex-row md:items-center gap-4">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-full bg-white p-1 shadow-[0_0_0_2px_#D4AF37]"><img id="hCat" src="" class="w-full h-full rounded-full object-cover"/></div>
      <div><h1 class="font-bold text-[16px]">Blue Gallery • Squidley</h1><p class="text-white/50 text-[11px]">Alternative grid view • Connected to main app • Saves to Downloads</p></div>
    </div>
    <div class="md:ml-auto flex flex-wrap gap-2 items-center">
      <button id="btnBack" class="px-3 py-1.5 rounded-full bg-white/10 border border-white/10 text-xs">← Back to Squidley</button>
      <div class="h-4 w-[1px] bg-white/20"></div>
      <button id="btnOpen" class="px-3 py-1.5 rounded-full bg-white/10 border border-white/10 text-xs">📂 Open</button>
      <div class="relative group">
        <button id="btnSaveMain" class="px-4 py-1.5 rounded-full bg-[#D4AF37] text-[#070f23] font-bold text-xs">💾 Save ▾</button>
        <div class="hidden group-hover:block absolute right-0 top-full mt-2 w-[260px] rounded-xl bg-[#0f2242] border border-[#D4AF37]/30 p-2 shadow-2xl z-30">
          <button data-save="text" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/10 text-xs"><b>1. Save only text • JSON</b><br><span class="text-white/50">Small file, editable, reloadable</span></button>
          <button data-save="images" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/10 text-xs mt-1"><b>2. Save as cards (images) • JSON</b><br><span class="text-white/50">One JSON with all blue cards as images — load in main app</span></button>
          <div class="h-[1px] bg-white/10 my-2"></div>
          <button id="btnExportPngs" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-white/10 text-xs"><b>Export blue cards as PNGs</b><br><span class="text-white/50">Individual PNG files to Downloads</span></button>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-6 flex gap-3 items-center">
    <input id="search" placeholder="Search..." class="flex-1 max-w-[320px] px-4 py-2 rounded-full bg-white/10 border border-white/10 text-sm"/>
    <button id="btnFlipAll" class="px-4 py-2 rounded-full bg-white/10 border border-white/10 text-xs">🔄 Flip All</button>
    <button id="btnUnhide" class="hidden px-3 py-2 rounded-full bg-white/10 border border-white/10 text-xs">↩ Unhide all</button>
    <span id="deckLabel" class="ml-auto text-[11px] text-white/40"></span>
  </div>

  <div id="grid" class="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  <div id="empty" class="hidden mt-12 text-center text-white/50 text-sm">No cards. Click Gallery in main app to import current deck, or Open JSON.</div>
</div>

<input id="fileOpen" type="file" accept=".json" class="hidden"/>
<div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
  <div class="w-full max-w-[520px] rounded-[16px] bg-[#0f2242] border border-[#D4AF37]/30 p-6">
    <h3 class="font-bold mb-3">Edit Card</h3>
    <label class="text-[10px] uppercase text-white/50">Front</label><input id="eFront" class="w-full mt-1 p-3 rounded-xl bg-white/10 border border-white/10 text-sm"/>
    <label class="text-[10px] uppercase text-white/50 mt-3 block">Back Meaning</label><textarea id="eBack" class="w-full mt-1 min-h-[120px] p-3 rounded-xl bg-white/10 border border-white/10 text-sm"></textarea>
    <div class="flex justify-end gap-2 mt-4"><button id="eCancel" class="px-4 py-2 rounded-full bg-white/10 text-xs">Cancel</button><button id="eSave" class="px-4 py-2 rounded-full bg-[#D4AF37] text-[#070f23] font-bold text-xs">Save</button></div>
  </div>
</div>

<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-4 py-2 rounded-full text-sm shadow-xl z-50"></div>

let deckName = "Squidley Gallery";
let cards = [];
let searchQ = ""; let globalFlipped=false; let editingId=null;

function loadFromMainApp(){
  // 1. Try localStorage from main app (squidley_blue_temp)
  try{
    const raw = localStorage.getItem('squidley_blue_temp');
    if(raw){
      const data = JSON.parse(raw);
      if(data && data.cards && data.cards.length){
        deckName = data.name || "Imported from Squidley";
        cards = data.cards.map((c,i)=>({
          id: String(i),
          front: (c.front||'').replace(/!\[.*?\]\(.*?\)/g, '').trim() || c.front,
          back: (c.back||'').replace(/!\[.*?\]\(.*?\)/g, '').trim() || c.back,
          arabic: c.arabic||"",
          number: String(i+1).padStart(2,'0'),
          hidden: !!c.hidden
        }));
        // Clean markdown image tags to text for gallery view
        cards = cards.map(c=>{
          // if front was an image markdown, keep url as image
          let f = c.front; let b = c.back;
          // If original had image markdown, extract url and keep as image card
          const imgRe = /!\[.*?\]\(data:image[^)]+\)/;
          // Keep as is for rendering logic
          return c;
        });
        return true;
      }
    }
  }catch(e){ console.log('no temp', e); }
  return false;
}

function isImageContent(s){ if(!s) return false; const e=s.trim(); if(!e) return false; if(/^data:image\//.test(e)) return true; if(/!\[.*?\]\(/.test(e)) return true; if(/<img[^>]+src=/i.test(e)) return true; if(/^https?:\/\/\S+\.(png|jpe?g|gif|webp|svg|bmp)(\?\S*)?$/i.test(e)) return true; return false; }
function extractImageUrl(s){ if(!s) return null; const e=s.trim(); const m=e.match(/!\[.*?\]\((.*?)\)/); if(m&&m[1]) return m[1].trim().split(/\s+/)[0].replace(/^["']|["']$/g,''); const t=e.match(/<img[^>]+src=["']([^"']+)["']/i); if(t&&t[1]) return t[1].trim(); const r=e.match(/(data:image\/[a-zA-Z0-9+.-]+;base64,[^\s"'<>)]+)/); if(r&&r[1]) return r[1].trim(); const l=e.match(/https?:\/\/[^\s"'<>)]+\.(?:png|jpe?g|gif|webp|svg|bmp)(?:\?[^\s"'<>)]*)?/i); if(l) return l[0].trim(); if(/^https?:\/\//.test(e)) return e; return null; }
function showToast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.remove('hidden'); setTimeout(()=>el.classList.add('hidden'),2800); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  const grid=document.getElementById('grid');
  const q=searchQ.toLowerCase();
  const filtered=cards.filter(c=>!c.hidden && (!q || c.front.toLowerCase().includes(q) || c.back.toLowerCase().includes(q) || (c.arabic&&c.arabic.includes(q))));
  grid.innerHTML='';
  if(filtered.length===0 && cards.length===0){ document.getElementById('empty').classList.remove('hidden'); } else { document.getElementById('empty').classList.add('hidden'); }
  filtered.forEach((card, idx)=>{
    const total=String(filtered.length).padStart(2,'0'); const num=String(idx+1).padStart(2,'0');
    const frontIsImg=isImageContent(card.front); const frontUrl=extractImageUrl(card.front);
    const backIsImg=isImageContent(card.back); const backUrl=extractImageUrl(card.back);
    const wrapper=document.createElement('div');
    wrapper.className='card-perspective h-[360px] relative group'+(globalFlipped?' card-flipped':'');
    let frontHTML=''; 
    if(frontIsImg && frontUrl){ frontHTML=`<div class="w-full h-full bg-white rounded-[16px] flex items-center justify-center p-3"><img src="${frontUrl}" class="w-full h-full object-contain max-h-[320px]"/></div>`; }
    else { frontHTML=`<div class="w-full h-full bg-gradient-to-br from-[#1a3a6a] to-[#0a1e3a] border border-[#2a4a7a] rounded-[16px] p-6 flex flex-col relative"><div class="flex justify-between items-start"><span class="text-[11px] tracking-[0.18em] text-[#D4AF37]">ASMAUL HUSNA ${num}/${total}</span><span class="w-2 h-2 rounded-full bg-[#D4AF37]"></span></div><div class="flex-1 flex flex-col items-center justify-center"><p class="text-[28px] font-bold tracking-tight">${esc(card.front)}</p><div class="w-8 h-[2px] bg-[#D4AF37] mt-3"></div></div><div class="flex justify-between items-end"><span class="text-[10px] text-white/30">🕌</span><span class="text-[10px] tracking-[0.15em] text-white/40">CLICK TO REVEAL</span></div></div>`; }
    let backHTML='';
    if(backIsImg && backUrl){ backHTML=`<div class="w-full h-full bg-white rounded-[16px] flex items-center justify-center p-3"><img src="${backUrl}" class="w-full h-full object-contain max-h-[320px]"/></div>`; }
    else { backHTML=`<div class="w-full h-full bg-gradient-to-br from-[#1a3a6a] to-[#0a1e3a] border border-[#2a4a7a] rounded-[16px] p-6 flex flex-col relative"><div class="text-center"><div class="text-[11px] tracking-[0.22em] text-white/50">THE MEANING</div><div class="text-[16px] font-bold text-[#D4AF37] mt-2">${esc(card.front)}</div><div class="flex items-center justify-center gap-2 mt-2"><div class="w-8 h-[1px] bg-[#D4AF37]/50"></div><span class="text-[#D4AF37] text-[8px]">◆</span><div class="w-8 h-[1px] bg-[#D4AF37]/50"></div></div></div><div class="flex-1 flex items-center justify-center text-center"><p class="text-[15px] leading-[1.5] text-white/90 whitespace-pre-wrap">${esc(card.back)}</p></div><div class="flex justify-between items-end"><span class="text-[10px] text-white/30">TAP TO FLIP</span><span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-[11px]">${card.number||num}</span><span class="text-[10px]">🕌</span></div></div>`; }

    wrapper.innerHTML=`<div class="card-inner rounded-[16px] p-[2px] bg-[#1e3a5f] h-full"><div class="card-face">${frontHTML}</div><div class="card-face card-back">${backHTML}</div></div><div class="absolute top-2 right-2 flex gap-1 z-10 opacity-0 group-hover:opacity-100 transition"><button data-edit="${card.id}" class="w-7 h-7 rounded-full bg-black/60 border border-white/20 text-[11px]">✎</button><button data-hide="${card.id}" class="w-7 h-7 rounded-full bg-black/60 border border-white/20 text-[11px]">🙈</button></div>`;
    wrapper.addEventListener('click', e=>{ if(e.target.closest('button')) return; wrapper.classList.toggle('card-flipped'); });
    grid.appendChild(wrapper);
  });
  document.getElementById('btnUnhide').classList.toggle('hidden', cards.filter(c=>c.hidden).length===0);
  grid.querySelectorAll('[data-hide]').forEach(b=>b.addEventListener('click', e=>{e.stopPropagation(); cards=cards.map(c=>c.id===b.dataset.hide?{...c,hidden:true}:c); render();}));
  grid.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', e=>{e.stopPropagation(); const c=cards.find(x=>x.id===b.dataset.edit); if(!c) return; editingId=c.id; document.getElementById('eFront').value=c.front; document.getElementById('eBack').value=c.back; document.getElementById('editModal').classList.remove('hidden');}));
}

document.getElementById('eCancel').addEventListener('click', ()=>{document.getElementById('editModal').classList.add('hidden');});
document.getElementById('eSave').addEventListener('click', ()=>{ if(!editingId) return; cards=cards.map(c=>c.id===editingId?{...c, front:document.getElementById('eFront').value, back:document.getElementById('eBack').value}:c); document.getElementById('editModal').classList.add('hidden'); render();});

// Open JSON
document.getElementById('btnOpen').addEventListener('click', ()=>document.getElementById('fileOpen').click());
document.getElementById('fileOpen').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{try{const j=JSON.parse(r.result); if(j.cards){cards=j.cards.map((c,i)=>({id:String(i), front:c.front||c.name||"", back:c.back||c.meaning||"", arabic:c.arabic||"", number:String(i+1).padStart(2,'0'), hidden:!!c.hidden})); deckName=j.name||"Imported"; render(); showToast('Loaded '+cards.length+' cards');}}catch{showToast('Invalid JSON');}}; r.readAsText(f);
});

// Canvas helper for blue card drawing
function drawBlueFront(ctx, card, idx, total){
  const W=800, H=800;
  const grad=ctx.createLinearGradient(0,0,0,H); grad.addColorStop(0,'#1a3a6a'); grad.addColorStop(1,'#0a1e3a');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#2a4a7a'; ctx.lineWidth=4; ctx.strokeRect(2,2,W-4,H-4);
  ctx.fillStyle='#D4AF37'; ctx.font='12px sans-serif'; ctx.textAlign='left'; ctx.fillText(`ASMAUL HUSNA ${String(idx+1).padStart(2,'0')}/${String(total).padStart(2,'0')}`, 30, 40);
  ctx.beginPath(); ctx.arc(W-30,35,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.font='bold 44px Inter, sans-serif'; ctx.textAlign='center'; ctx.fillText(card.front, W/2, H/2);
  ctx.fillStyle='#D4AF37'; ctx.fillRect(W/2-20, H/2+20, 40, 3);
  ctx.font='11px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.textAlign='left'; ctx.fillText('CLICK TO REVEAL MEANING', W-230, H-30);
}
function drawBlueBack(ctx, card, idx){
  const W=800, H=800;
  const grad=ctx.createLinearGradient(0,0,0,H); grad.addColorStop(0,'#1a3a6a'); grad.addColorStop(1,'#0a1e3a');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#2a4a7a'; ctx.lineWidth=4; ctx.strokeRect(2,2,W-4,H-4);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText('THE MEANING', W/2, 50);
  ctx.fillStyle='#D4AF37'; ctx.font='bold 22px Inter, sans-serif'; ctx.fillText(card.front, W/2, 85);
  ctx.fillStyle='white'; ctx.font='18px Inter, sans-serif';
  const lines=wrapText(ctx, card.back, W-100);
  let y= H/2 - (lines.length*14);
  lines.forEach(l=>{ ctx.fillText(l, W/2, y); y+=30; });
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='11px sans-serif'; ctx.textAlign='left'; ctx.fillText('TAP TO FLIP', 30, H-30);
  ctx.textAlign='center'; ctx.fillText(card.number||String(idx+1).padStart(2,'0'), W/2, H-30);
}
function wrapText(ctx, text, maxWidth){
  const words=text.split(' '); let lines=[]; let line=''; for(let w of words){ const test=line+w+' '; if(ctx.measureText(test).width>maxWidth){ lines.push(line.trim()); line=w+' '; } else line=test; } lines.push(line.trim()); return lines;
}

// Save handlers
async function saveTextJSON(){
  const payload={name:deckName, theme:{name:"Squidley Blue", bg:"#070f23"}, cards: cards.map(c=>({front:c.front, back:c.back, arabic:c.arabic, number:c.number, hidden:c.hidden}))};
  const blob=new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=deckName.replace(/[^a-z0-9]/gi,'_')+'-text.json'; document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},500);
  showToast('Saved text JSON to Downloads');
}

async function saveImageCardsJSON(){
  showToast('Generating blue card images for JSON... this takes a moment');
  const canvas=document.getElementById('exportCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=800; canvas.height=800;
  const imageCards=[];
  for(let i=0;i<cards.length;i++){
    const c=cards[i];
    // Front
    drawBlueFront(ctx, c, i, cards.length);
    const frontDataUrl=canvas.toDataURL('image/png');
    // Back
    drawBlueBack(ctx, c, i);
    const backDataUrl=canvas.toDataURL('image/png');
    imageCards.push({
      front: `![image](${frontDataUrl})`,
      back: `![image](${backDataUrl})`,
      hidden: !!c.hidden,
      originalFront: c.front,
      originalBack: c.back
    });
    await new Promise(r=>setTimeout(r,100));
  }
  const payload={
    name: deckName + " • Blue Image Cards",
    theme: {name:"Squidley Blue Image", bg:"#070f23", type:"image-cards"},
    savedAt: new Date().toISOString(),
    cards: imageCards
  };
  const blob=new Blob([JSON.stringify(payload)], {type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=deckName.replace(/[^a-z0-9]/gi,'_')+'-BLUE-IMAGE-CARDS.json'; document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},500);
  showToast(`Saved ${imageCards.length} image cards as ONE JSON to Downloads`);
}

document.querySelectorAll('[data-save]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const type=btn.dataset.save;
    if(type==='text') saveTextJSON();
    if(type==='images') saveImageCardsJSON();
  });
});

// Export PNGs individually
document.getElementById('btnExportPngs').addEventListener('click', async ()=>{
  showToast('Exporting PNGs...');
  const canvas=document.getElementById('exportCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=800; canvas.height=800;
  for(let i=0;i<cards.length;i++){
    const c=cards[i];
    drawBlueFront(ctx, c, i, cards.length);
    let url=canvas.toDataURL('image/png');
    let a=document.createElement('a'); a.href=url; a.download=`${String(i+1).padStart(2,'0')}-${c.front.replace(/[^a-zA-Z0-9]/g,'_')}-FRONT.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    await new Promise(r=>setTimeout(r,350));
    drawBlueBack(ctx, c, i);
    url=canvas.toDataURL('image/png');
    a=document.createElement('a'); a.href=url; a.download=`${String(i+1).padStart(2,'0')}-${c.front.replace(/[^a-zA-Z0-9]/g,'_')}-BACK.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    await new Promise(r=>setTimeout(r,400));
  }
  showToast('All PNGs saved to Downloads');
});

// Init - try load from main app
(function(){
  if(!loadFromMainApp()){
    // fallback to demo
    cards=FALLBACK_CARDS.map((c,i)=>({id:String(i), front:c.front, back:c.back, arabic:c.arabic, number:c.number, hidden:false}));
  }
  render();
})();
